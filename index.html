<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThriveLink Billing Engine — Prototype</title>
<style>
  :root{
    --navy:#1B1F6B; --coral:#E8748A; --coral-d:#C2455F; --coral-lt:#FBEDF1;
    --peri:#8DA4D4; --peri-lt:#EEF2FA;
    --blue:#1B1F6B; --blue-lt:#EEF2FA; --green:#15803D; --green-lt:#EAF6EE;
    --red:#B91C1C; --red-lt:#FDEDED; --amber:#B45309; --amber-lt:#FEF6E7;
    --ink:#1F2937; --mut:#6B7280; --line:#E5E7EB; --bg:#FFFFFF; --card:#FFFFFF;
    --serif:Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  header{background:#fff;color:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--peri)}
  header h1{font-size:19px;font-weight:700;font-family:var(--serif);color:var(--navy)}
  header .sub{font-size:12px;color:var(--mut)}
  .wordmark{font-family:var(--serif);font-weight:700;font-size:21px;color:var(--navy);white-space:nowrap}
  .wordmark b{color:var(--coral);font-weight:700}
  .eyebrow{display:block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--coral-d);margin-bottom:2px}
  nav{display:flex;gap:2px;background:#fff;border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto}
  nav button{border:none;background:none;padding:12px 16px;font-size:13.5px;font-weight:500;color:var(--mut);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
  nav button.on{color:var(--navy);border-bottom-color:var(--coral)}
  main{max-width:1120px;margin:0 auto;padding:20px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--peri);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(27,31,107,.06)}
  .card h2{font-size:16px;margin-bottom:10px;font-family:var(--serif);color:var(--navy)}
  .card h3{font-size:13.5px;margin:12px 0 6px;color:var(--navy)}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);text-align:left;padding:7px 8px;border-bottom:1.5px solid var(--line);white-space:nowrap}
  td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .c-ok{background:var(--green-lt);color:var(--green)} .c-bad{background:var(--red-lt);color:var(--red)}
  .c-warn{background:var(--amber-lt);color:var(--amber)} .c-info{background:var(--blue-lt);color:var(--blue)}
  .c-mut{background:#EEF0F3;color:var(--mut)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink)}
  .btn:hover{border-color:#c9cdd4}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.grn{background:var(--green);border-color:var(--green);color:#fff}
  .btn.sm{padding:4px 9px;font-size:12px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  select,input{border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;background:#fff;color:var(--ink)}
  input[type=number]{width:80px} input[type=date]{width:140px}
  label{font-size:11.5px;color:var(--mut);display:block;margin-bottom:3px;font-weight:600}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .kpi{text-align:left}
  .kpi .v{font-size:24px;font-weight:700;margin:2px 0}
  .kpi .l{font-size:12px;color:var(--mut)}
  .note{font-size:12.5px;color:var(--mut);line-height:1.5}
  .banner{background:var(--amber-lt);border:1px solid #F3DFB8;border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--amber);margin-bottom:14px;line-height:1.55}
  .err{font-size:12px;color:var(--red);line-height:1.4}
  .bar{height:18px;background:var(--blue);border-radius:4px;min-width:2px}
  .barrow{display:grid;grid-template-columns:150px 1fr 90px;gap:10px;align-items:center;margin-bottom:8px;font-size:13px}
  .mono{font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
  .icd-pop{position:relative}
  .icd-list{position:absolute;z-index:10;background:#fff;border:1px solid var(--line);border-radius:8px;max-height:180px;overflow:auto;width:320px;box-shadow:0 6px 20px rgba(0,0,0,.1)}

  .icd-list div:hover{background:var(--blue-lt)}

  .invoice h2{font-size:18px} .invoice .meta{font-size:12.5px;color:var(--mut);margin:6px 0 14px}
  .tag{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--coral-d)}
  .lockmsg{font-size:12px;color:var(--mut);font-style:italic}
  /* tooltips */
  .tt{border-bottom:1px dotted #9aa3af;cursor:help;position:relative}
  .tt:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 8px);
    background:var(--navy);color:#fff;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:400;
    width:250px;z-index:60;line-height:1.5;white-space:normal;box-shadow:0 5px 16px rgba(0,0,0,.28);pointer-events:none;text-transform:none;letter-spacing:0}
  .tt:hover::before{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 2px);
    border:6px solid transparent;border-top-color:var(--navy);z-index:60}
  th .tt:hover::after, .kpi .tt:hover::after{left:0;transform:none}
  th .tt:hover::before, .kpi .tt:hover::before{left:14px}
  /* workflow stepper */
  .flow{display:flex;align-items:stretch;gap:0;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:16px;overflow-x:auto}
  .fstep{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;position:relative}
  .fstep:hover{background:var(--blue-lt)}
  .fstep .n{width:22px;height:22px;border-radius:50%;background:#EEF0F3;color:var(--mut);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;flex:none}
  .fstep.done .n{background:var(--green);color:#fff}
  .fstep.now .n{background:var(--coral);color:#fff}
  .fstep .lb{font-size:12.5px;font-weight:600;color:var(--ink)}
  .fstep .sb{font-size:10.5px;color:var(--mut);display:block;margin-top:1px;font-weight:400}
  .farrow{align-self:center;color:#c4cad3;padding:0 2px;flex:none}
  .fstep:hover::after{content:attr(data-tip);position:absolute;left:0;top:calc(100% + 8px);
    background:var(--navy);color:#fff;padding:9px 11px;border-radius:8px;font-size:12px;width:260px;z-index:70;line-height:1.5;white-space:normal;box-shadow:0 5px 16px rgba(0,0,0,.28);pointer-events:none}

const dISO = s => s ? new Date(s+'T00:00:00') : null;

/* ================= CORE LOGIC ================= */
const P = id => state.patients.find(p=>p.id===id);
const SVC = (org,code) => state.orgs[org].services.find(s=>s.code===code);

function authStatus(p){
  if(!p.authNo || !p.authStart || !p.authEnd) return {k:'missing', label:'No auth on file'};
  if(dISO(p.authEnd) < dISO(TODAY)) return {k:'expired', label:'Auth expired '+dUS(p.authEnd)};
  const days = Math.round((dISO(p.authEnd)-dISO(TODAY))/86400000);
  if(days<=30) return {k:'expiring', label:'Auth expires in '+days+'d'};
  return {k:'active', label:'Auth active thru '+dUS(p.authEnd)};
}

function calc(item){
  const svc = SVC(item.org,item.code);
  if(!svc || svc.rate==null) return {amount:0, detail:'rate not configured', carry:0};
  if(svc.bundle){
    const bundles = Math.floor(item.qty/svc.bundle), carry = item.qty % svc.bundle;
    return {amount:bundles*svc.rate, detail:`${bundles} bundle(s) × ${fmt(svc.rate)}`, carry};
  }
  return {amount:item.qty*svc.rate, detail:`${item.qty} × ${fmt(svc.rate)}`, carry:0};
}

function validate(item){
  const errs=[]; const p=P(item.pid); const org=state.orgs[item.org]; const svc=SVC(item.org,item.code);
  if(p.dup) errs.push('Chart-integrity hold: suspected duplicate of '+(P(p.dupOf)?.name||'another chart')+' (same name/DOB/phone). Resolve before billing.');
  if(svc && svc.rate==null) errs.push('No rate configured for '+item.code+' — set it in Org Configuration.');
  if(item.org==='CCHP'){
    if(!p.ids.some(i=>i.t==='CIN')) errs.push('Missing CIN — required for every CCHP claim.');
    if(!p.icd10.length) errs.push('Missing ICD-10 diagnosis — required on every claim line.');
    const a=authStatus(p);
    if(a.k==='missing') errs.push('No authorization on file — service is outside an auth window.');
    else if(dISO(item.from)<dISO(p.authStart) || dISO(item.to)>dISO(p.authEnd))
      errs.push(`Service dates outside auth window (${dUS(p.authStart)}–${dUS(p.authEnd)}) — will not be paid.`);
  }
  return errs;
}

function claimNo(org){ return '#'+state.orgs[org].prefix+(300000+Math.floor(Math.random()*500000)); }

/* ================= TOOLTIP HELPER + WORKFLOW ================= */
const tt=(txt,tip)=>`<span class="tt" data-tip="${tip}">${txt}</span>`;

const FLOW=[
 ['Configure org','config','Set up each organization once: its service menu (codes + flat rates + units), billing method, cadence, and which chart fields are mandatory. Everything downstream reads from this — staff never type prices.'],
 ['Chart ready','patients','Before anything can be billed, the patient chart must pass the minimum-data bar: verified identity, no duplicate flag, IDs on the identifier table, and for CCHP a CIN, at least one ICD-10 code, and an active authorization.'],
 ['Log services','work','Staff record what happened — a grocery delivery, an RD visit, an engagement — as line items in a billing period. This replaces the Excel trackers. Amounts are calculated automatically from the org menu.'],
 ['Validate','work','The engine runs the payment rules the payer will apply: service dates inside the auth window, required IDs and diagnoses present, rate configured, no duplicate-chart hold. Anything that would be denied is blocked here, before submission — not discovered after.'],
 ['Approve & lock','work','A reviewer approves the period. Line items become immutable and each gets a claim number. Locking is what makes the numbers auditable and the analytics trustworthy.'],
 ['Export / submit','export','The same claims render into whatever shape each payer wants: a QuickBooks invoice for Atrium, the Friday report for CSH, or the Epic-format claims export for CCHP that staff key into CCLink.'],
 ['Track payment','export','Each exported claim is marked paid when money arrives. Billed-versus-collected per claim closes the reconciliation gap Stacey flagged (spend with no deposits logged).'],
 ['Analyze','analytics','Because every claim from every org lives in one table with one schema, dashboards are just queries: billed per org for partners, blocked revenue, auth watchlist, and status funnel for internal teams.'],
];
function flowStrip(){
  const stepDone=[
    Object.values(state.orgs).some(o=>o.services.some(s=>s.rate!=null)),          // configured
    state.patients.some(p=>!p.dup&&authStatus(p).k==='active'),                    // some charts ready
    state.items.length>0,                                                          // services logged
    state.items.some(i=>!validate(i).length),                                      // some pass validation
    Object.keys(state.locked).length>0,                                            // locked
    state.items.some(i=>i.status==='exported'),                                    // exported
    state.items.some(i=>i.paid),                                                   // paid
    false,
  ];
  return `<div class="flow">${FLOW.map(([lb,tab,tip],i)=>
    `<div class="fstep ${stepDone[i]?'done':''} ${state.tab===tab&&!stepDone[i]?'now':''}" data-tip="${tip}" onclick="go('${tab}')">
       <span class="n">${stepDone[i]?'✓':i+1}</span><span><span class="lb">${lb}</span></span>
     </div>${i<FLOW.length-1?'<span class="farrow">→</span>':''}`).join('')}</div>`;
}

/* ================= NAV / RENDER ================= */
const TABS=[['patients','Patients'],['config','Org Configuration'],['work','Billing Work Area'],['export','Export & Submit'],['analytics','Analytics']];

    `<button class="${state.tab===k?'on':''}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(t){ state.tab=t; render(); }
function render(){ nav(); const r={patients:rPatients,config:rConfig,work:rWork,export:rExport,analytics:rAnalytics}[state.tab]; document.getElementById('main').innerHTML=flowStrip()+r(); }

/* ================= PATIENTS ================= */
function authChip(p){
  const a=authStatus(p);
  const cls={active:'c-ok',expiring:'c-warn',expired:'c-bad',missing:'c-bad'}[a.k];
  return `<span class="chip ${cls}">${a.label}</span>`;

function icdSearch(inp,pid){
  const q=inp.value.toLowerCase(); const box=document.getElementById('icd-'+pid);
  if(q.length<2){box.style.display='none';return}
  const hits=ICD_DB.filter(([c,d])=>c.toLowerCase().includes(q)||d.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML=hits.map(([c,d])=>`<div onclick="addIcd('${pid}','${c}')"><b class="mono">${c}</b> — ${d}</div>`).join('')||'<div class="note" style="padding:8px">No match</div>';
  box.style.display='block';
}
function addIcd(pid,code){ const p=P(pid); if(!p.icd10.includes(code)&&p.icd10.length<3)p.icd10.push(code); render(); }
function resolveDup(pid){
  const p=P(pid);
  if(confirm('Staff review: merge "'+p.name+'" into the existing chart for '+(P(p.dupOf)?.name||'primary chart')+'?\n\n(Per policy: never auto-merge; full audit history retained.)')){
    p.dup=false; p.merged=true; p.name+=' (merged → '+P(p.dupOf).name+')';
    state.items.filter(i=>i.pid===pid).forEach(i=>i.pid=p.dupOf);
    render();
  }
}

    return { code:g('.s-code').value.trim(), name:g('.s-name').value.trim()||g('.s-code').value.trim(),
      rate:g('.s-rate').value===''?null:Number(g('.s-rate').value),

  state.addingOrg=false; state.configOrg=prefix; state.workOrg=prefix; render();
}

  const items=state.items.filter(i=>i.org===state.exportOrg&&(i.status==='approved'||i.status==='exported'));
  const sel=`<div class="row" style="margin-bottom:14px">
    <div><label>Organization</label><select onchange="state.exportOrg=this.value;render()">
      ${Object.values(state.orgs).map(x=>`<option value="${x.id}" ${x.id===state.exportOrg?'selected':''}>${x.name}</option>`).join('')}</select></div></div>`;
  if(!items.length) return sel+`<div class="card"><h2>${o.name}</h2><p class="note">Nothing to export — approve &amp; lock the billing period in the Work Area first. Only approved claims can be exported (draft work never leaves the system).</p></div>`;
  const total=items.reduce((s,i)=>s+calc(i).amount,0);
  const exported=items.every(i=>i.status==='exported');
  let body='';
  if(o.exportType==='invoice'){
    body=`<div class="invoice">
      <h2>INVOICE</h2>
      <div class="meta">From: Nutrible (ThriveLink) · Tax ID 88-2673175<br>Bill to: ${o.name}<br>Period: ${dUS(state.periodFrom)} – ${dUS(state.periodTo)} · Date: ${dUS(TODAY)}</div>
      <table><tr><th>Patient</th><th>Service</th><th>Detail</th><th>Amount</th></tr>
      ${items.map(i=>`<tr><td>${P(i.pid).name}</td><td class="mono">${i.code}</td><td class="note">${calc(i).detail}</td><td>${fmt(calc(i).amount)}</td></tr>`).join('')}
      <tr><td colspan="3" style="text-align:right"><b>Total due</b></td><td><b>${fmt(total)}</b></td></tr></table>
      <div class="note" style="margin-top:10px">MVP: record manually in QuickBooks · Phase 2: QuickBooks API</div></div>`;
  } else if(o.exportType==='report'){
    const byP={}; items.forEach(i=>{ (byP[i.pid]=byP[i.pid]||[]).push(i); });
    const cols=o.services.filter(s=>items.some(i=>i.code===s.code));
    body=`<h3>${o.cadence.startsWith('Weekly')?'Weekly Engagement & Billing Report — week ending Friday '+dUS(state.periodTo):'Billing Report — period ending '+dUS(state.periodTo)}</h3>
      <table><tr><th>Patient</th><th>ThriveLink ID</th>${cols.map(s=>`<th>${s.name}</th>`).join('')}<th>Total</th></tr>
      ${Object.entries(byP).map(([pid,rows])=>{
        const g=c=>rows.filter(r=>r.code===c).reduce((s,r)=>s+r.qty,0);
        const t=rows.reduce((s,r)=>s+calc(r).amount,0);
        return `<tr><td>${P(pid).name}</td><td class="mono">${P(pid).ids[0].v}</td>${cols.map(s=>`<td>${g(s.code)}</td>`).join('')}<td><b>${fmt(t)}</b></td></tr>`;}).join('')}
      <tr><td colspan="${cols.length+2}" style="text-align:right"><b>Report total</b></td><td><b>${fmt(total)}</b></td></tr></table>
      <p class="note" style="margin-top:8px">${o.id==='CSH'?'Replaces the manual Friday report built from CSH Hosp_Engagement_Charge.':'Columns generated from this org’s service menu.'}</p>`;
  } else if(o.exportType==='epic' && o.id!=='CCHP'){
    body=`<h3>Claims export — for entry into the payer's system</h3>
      <table><tr><th>Claim #</th><th>Patient</th><th>ID</th><th>Code</th><th>From</th><th>To</th><th>Qty</th><th>Amount</th></tr>
      ${items.map(i=>{const p=P(i.pid);return `<tr><td class="mono">${i.claim}</td><td>${p.name}</td><td class="mono">${p.ids[0]?.v||''}</td><td class="mono">${i.code}</td><td>${dUS(i.from)}</td><td>${dUS(i.to)}</td><td>${i.qty}</td><td>${fmt(calc(i).amount)}</td></tr>`;}).join('')}
      </table>
      <p class="note" style="margin-top:8px">⚠ Generic layout — the exact column template must be mapped with this payer during onboarding (like the CCHP template was).</p>`;
  } else {
    const byP={}; items.forEach(i=>{ (byP[i.pid]=byP[i.pid]||[]).push(i); });
    body=`<h3>CCHP Billing Claims Export — for manual Epic (CCLink) entry</h3>
      <div style="overflow-x:auto"><table>
      <tr><th>#</th><th>Patient</th><th>${tt('CIN','Client Index Number — the Medi-Cal member ID. Staff search Epic by CIN to find the patient. No CIN, no claim.')}</th><th>${tt('Auth #','The authorization number from the referral. Epic entry outside the auth period = no payment.')}</th><th>Start</th><th>End</th><th>${tt('Dx (ICD-10)','Diagnosis codes justifying medical necessity, up to 3. Keyed into Epic as associated diagnosis letters A, B, C.')}</th><th># RD Consults</th><th>Consult $</th><th>${tt('Wks Grocery','Weeks of grocery delivery at $60 per week. Note: the rate table says per service — unit needs confirmation with Edward.')}</th><th>Grocery $</th><th>Billing Date</th><th>Total</th></tr>
      ${Object.entries(byP).map(([pid,rows],ix)=>{
        const p=P(pid);
        const rd=rows.filter(r=>r.code==='S9470').reduce((s,r)=>s+r.qty,0);
        const rdA=rows.filter(r=>r.code==='S9470').reduce((s,r)=>s+calc(r).amount,0);
        const gr=rows.filter(r=>r.code==='S9977').reduce((s,r)=>s+r.qty,0);
        const grA=rows.filter(r=>r.code==='S9977').reduce((s,r)=>s+calc(r).amount,0);
        return `<tr><td>${ix+1}</td><td>${p.name}</td><td class="mono">${p.ids.find(x=>x.t==='CIN')?.v||''}</td><td class="mono">${p.authNo}</td><td>${dUS(p.authStart)}</td><td>${dUS(p.authEnd)}</td><td class="mono">${p.icd10.join(', ')}</td><td>${rd}</td><td>${fmt(rdA)}</td><td>${gr}</td><td>${fmt(grA)}</td><td>${dUS(TODAY)}</td><td><b>${fmt(rdA+grA)}</b></td></tr>`;}).join('')}
      </table></div>
      <p class="note" style="margin-top:8px">Epic keying per row: search CIN → ICD-10 → dates → POS 12 (Home) → service code → modifier U6 → amount → Vendor: Nutrible, Tax ID 88-2673175.</p>`;
  }
  return sel+`<div class="card">
    <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2>${o.name} — ${o.method}</h2>
      <div class="row">
        <button class="btn" onclick="downloadCSV('${o.id}')">⬇ Download CSV</button>
        ${!exported?`<button class="btn pri" onclick="markExported('${o.id}')">Mark exported / submitted</button>`:'<span class="chip c-ok">Exported ✓</span>'}
      </div>
    </div>
    ${body}
    ${exported?`<h3>Payment tracking</h3><table><tr><th>Claim #</th><th>Patient</th><th>Amount</th><th>Paid?</th></tr>
      ${items.map(i=>`<tr><td class="mono">${i.claim}</td><td>${P(i.pid).name}</td><td>${fmt(calc(i).amount)}</td>
      <td>${i.paid?'<span class="chip c-ok">Paid</span>':`<button class="btn sm" onclick="markPaid(${i.id})">Mark paid</button>`}</td></tr>`).join('')}</table>
      <p class="note">Closes the reconciliation gap: billed vs collected is now visible per claim.</p>`:''}
  </div>`;
}
function markExported(org){ state.items.filter(i=>i.org===org&&i.status==='approved').forEach(i=>i.status='exported'); render(); }
function markPaid(id){ state.items.find(i=>i.id===id).paid=true; render(); }
function downloadCSV(org){
  const items=state.items.filter(i=>i.org===org&&(i.status==='approved'||i.status==='exported'));
  let rows=[['Claim','Patient','ID','Code','From','To','Qty','Amount','Status']];
  items.forEach(i=>{const p=P(i.pid);rows.push([i.claim,p.name,p.ids.find(x=>x.t==='CIN')?.v||p.ids[0]?.v,i.code,i.from,i.to,i.qty,calc(i).amount,i.status]);});
  const csv=rows.map(r=>r.map(c=>`"${c??''}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=org+'_billing_export.csv'; a.click();
}

/* ================= ANALYTICS ================= */
function rAnalytics(){
  const all=state.items;
  const billable=i=>!validate(i).length;
  const amt=i=>calc(i).amount;
  const tot=all.filter(billable).reduce((s,i)=>s+amt(i),0);
  const paid=all.filter(i=>i.paid).reduce((s,i)=>s+amt(i),0);
  const exported=all.filter(i=>i.status==='exported').reduce((s,i)=>s+amt(i),0);
  const blockedItems=all.filter(i=>validate(i).length);
  const blockedVal=blockedItems.reduce((s,i)=>{const sv=SVC(i.org,i.code);return s+(sv&&sv.rate?i.qty*sv.rate:0);},0);
  const reasons={};
  blockedItems.forEach(i=>validate(i).forEach(e=>{
    const k=e.includes('duplicate')?'Duplicate chart hold':e.includes('CIN')?'Missing CIN':e.includes('ICD')?'Missing ICD-10':e.includes('auth')||e.includes('window')?'Auth expired / missing':'Rate not configured';
    reasons[k]=(reasons[k]||0)+1;}));
  const orgTotals=Object.keys(state.orgs).map(o=>[o,all.filter(i=>i.org===o&&billable(i)).reduce((s,i)=>s+amt(i),0)]);
  const max=Math.max(...orgTotals.map(x=>x[1]),1);
  const watch=state.patients.filter(p=>['expired','expiring','missing'].includes(authStatus(p).k)&&!p.merged);
  return `
  <div class="grid g4" style="margin-bottom:14px">
    <div class="card kpi"><div class="l">${tt('Billable (validated)','Everything across all orgs that passes validation — the true revenue pipeline, not inflated by items that would be denied.')}</div><div class="v">${fmt(tot)}</div></div>
    <div class="card kpi"><div class="l">${tt('Exported / submitted','Claims that left the building: invoiced to Atrium, reported to CSH, or exported for Epic keying.')}</div><div class="v">${fmt(exported)}</div></div>
    <div class="card kpi"><div class="l">${tt('Collected (paid)','Money actually received, per claim. Billed minus collected = outstanding — the number Stacey could not see before.')}</div><div class="v" style="color:var(--green)">${fmt(paid)}</div></div>
    <div class="card kpi"><div class="l">${tt('Revenue at risk (blocked)','Dollar value of items stuck at validation — expired auths, missing CINs, duplicate holds. The cost of dirty charts, made visible.')}</div><div class="v" style="color:var(--red)">${fmt(blockedVal)}</div></div>
  </div>
  <div class="grid g2">
    <div class="card"><h2>Billed per organization <span class="note">(external view: partners see their own row, drillable to patient)</span></h2>
      ${orgTotals.map(([o,v])=>`<div class="barrow"><span>${state.orgs[o].name.split(' (')[0].split(' —')[0]}</span><div><div class="bar" style="width:${(v/max*100).toFixed(0)}%"></div></div><b>${fmt(v)}</b></div>`).join('')}
      <div class="note">One claims table → this chart is a query, not a spreadsheet exercise.</div></div>
    <div class="card"><h2>Validation failures <span class="note">(internal view — why money is stuck)</span></h2>
      <table><tr><th>Reason</th><th>Count</th></tr>
      ${Object.entries(reasons).map(([k,v])=>`<tr><td>${k}</td><td><b>${v}</b></td></tr>`).join('')||'<tr><td class="note" colspan="2">All items pass ✓</td></tr>'}</table></div>
    <div class="card"><h2>Auth watchlist</h2>
      <table><tr><th>Patient</th><th>Org</th><th>Auth</th><th>Status</th></tr>
      ${watch.map(p=>`<tr><td>${p.name}</td><td class="mono">${state.orgs[p.org].prefix}</td><td class="note">${p.authNo?dUS(p.authStart)+' → '+dUS(p.authEnd):'—'}</td><td>${authChip(p)}</td></tr>`).join('')||'<tr><td class="note" colspan="4">No auths at risk</td></tr>'}</table>
      <div class="note" style="margin-top:6px">Alerts fire before RDs schedule or groceries ship outside a window.</div></div>
    <div class="card"><h2>Claim status funnel</h2>
      <table><tr><th>Status</th><th>Items</th><th>Value</th></tr>
      ${['draft','approved','exported'].map(st=>{const its=all.filter(i=>i.status===st&&billable(i));return `<tr><td style="text-transform:capitalize">${st}</td><td>${its.length}</td><td>${fmt(its.reduce((s,i)=>s+amt(i),0))}</td></tr>`;}).join('')}
      <tr><td>Paid</td><td>${all.filter(i=>i.paid).length}</td><td>${fmt(paid)}</td></tr></table></div>
  </div>`;
}

render();
</script>
</body>
